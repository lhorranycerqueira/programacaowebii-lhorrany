<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro exercício</title>
    <style>
        /* configurações globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px; /* a base pro calculo em*/
            background-color: #0b0e14; 
            color: #ffffff;
        }
        /* uso de vh e vw o header ocupa 70 por cento da altura e 100 da largura */
        header {
            width: 100vw;
            height: 70vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(138, 43, 226 0.4)), 
            url('https://i.pinimg.com/736x/72/f0/df/72f0dfaa6847ba8f4a10c28263b9d347.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 8px solid #8a2be2;
        }
        header h1 {
            font-size: 5em; /* tamanho gigante relativo a fonte do body*/
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 10px #000;
        }
        header p {
            font-size: 1.5em;
            margin-top: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 0.5em 1em;
        }
        .main-content {
            width: 90%;
            margin: 2%;
            float: left;
            background: #252a35;
            border: 1px solid #3d4451;
        }
    </style>
</head>
<body>
    
</body>
</html>
